        class Plant {
            constructor(type, col, row) {
                this.type = type;
                this.col = col;
                this.row = row;
                
                // 计算放置坐标 (中心点)
                this.x = col * 90 + 145;
                this.y = row * 100 + 150;
                
                const meta = PLANT_TYPES[type];
                this.maxHealth = meta.maxHealth;
                this.health = this.maxHealth;
                this.cost = meta.cost;
                this.frame = Math.floor(Math.random() * 100); // 随机动画偏置，动作交错

                this.lastActionTime = Date.now();
                this.isShooting = false;
                this.shootingAnimTimer = 0;
            }

            takeDamage(dmg) {
                this.health -= dmg;
                return this.health <= 0;
            }

            update(zombies, spawnSunCallback, spawnProjectileCallback) {
                this.frame++;

                if (this.shootingAnimTimer > 0) {
                    this.shootingAnimTimer--;
                    if (this.shootingAnimTimer === 0) {
                        this.isShooting = false;
                    }
                }

                // 不同植物的独特机制
                if (this.type === 'sunflower') {
                    // 每隔 20 秒产生阳光
                    const now = Date.now();
                    if (now - this.lastActionTime > 20000) {
                        this.lastActionTime = now;
                        // 在植物周围产生阳光
                        const sunX = this.x + (Math.random() - 0.5) * 40;
                        const sunY = this.y + (Math.random() - 0.5) * 30;
                        spawnSunCallback(sunX, sunY, true);
                    }
                } 
                else if (this.type === 'peashooter' || this.type === 'snowpea') {
                    // 检查同一行前方是否有僵尸
                    const hasZombieAhead = zombies.some(z => z.row === this.row && z.x > this.x && z.x < 1000);
                    if (hasZombieAhead) {
                        const now = Date.now();
                        if (now - this.lastActionTime > 1500) {
                            this.lastActionTime = now;
                            this.isShooting = true;
                            this.shootingAnimTimer = 12; // 射击动画帧维持 12 帧
                            // 发射豌豆，从嘴巴高度射出
                            spawnProjectileCallback(this.x + 20, this.y - 6, this.row, this.type === 'snowpea');
                        }
                    }
                }
                else if (this.type === 'cherrybomb') {
                    // 樱桃炸弹：1.2秒（72帧）后引爆
                    const now = Date.now();
                    if (now - this.lastActionTime > 1200) {
                        return true; // 触发爆炸销毁
                    }
                }
                return false;
            }

            draw(ctx) {
                const healthRatio = this.health / this.maxHealth;
                const cellW = 90;
                
                if (this.type === 'sunflower') {
                    DrawUtils.drawSunflowerCard(ctx, this.x, this.y, 80, this.frame);
                } 
                else if (this.type === 'peashooter') {
                    DrawUtils.drawPeashooterCard(ctx, this.x, this.y, 80, this.frame, false, this.isShooting);
                } 
                else if (this.type === 'snowpea') {
                    DrawUtils.drawPeashooterCard(ctx, this.x, this.y, 80, this.frame, true, this.isShooting);
                } 
                else if (this.type === 'wallnut') {
                    DrawUtils.drawWallNutCard(ctx, this.x, this.y, 80, healthRatio);
                } 
                else if (this.type === 'cherrybomb') {
                    const elapsed = Date.now() - this.lastActionTime;
                    const ageRatio = Math.min(elapsed / 1200, 1);
                    DrawUtils.drawCherryBombCard(ctx, this.x, this.y, 80, ageRatio, this.frame);
                }

                // 绘制血量条 (仅在受伤时展示)
                if (this.health < this.maxHealth) {
                    ctx.save();
                    const barW = 50;
                    const barH = 5;
                    const bx = this.x - barW / 2;
                    const by = this.y - 45;
                    
                    // 背景
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(bx, by, barW, barH);
                    
                    // 绿色填充
                    ctx.fillStyle = healthRatio > 0.5 ? '#22c55e' : (healthRatio > 0.25 ? '#f97316' : '#ef4444');
                    ctx.fillRect(bx, by, barW * healthRatio, barH);
                    ctx.restore();
                }
            }
        }

        class Zombie {
            constructor(type, row) {
                this.type = type;
                this.row = row;
                this.x = 980; // 画面最右侧进入
                this.y = row * 100 + 150; // 行中心线
                this.frame = Math.floor(Math.random() * 100);
                
                // 基础速度与生命设定
                this.baseSpeed = 0.22 + Math.random() * 0.08; 
                this.speed = this.baseSpeed;
                this.isEating = false;
                
                this.slowTimer = 0; // 冰冻减速剩余帧数

                if (type === 'normal') {
                    this.maxHealth = 200;
                    this.health = 200;
                } else if (type === 'conehead') {
                    this.maxHealth = 500; // 300 锥帽 + 200 本体
                    this.health = 500;
                } else if (type === 'buckethead') {
                    this.maxHealth = 1100; // 900 铁桶 + 200 本体
                    this.health = 1100;
                } else if (type === 'newspaper') {
                    this.maxHealth = 350; // 150 报纸 + 200 本体
                    this.health = 350;
                    this.hasNewspaper = true;
                    this.rageMode = false;
                }
            }

            takeDamage(dmg) {
                this.health -= dmg;
                
                // 报纸僵尸临界点判断
                if (this.type === 'newspaper' && this.hasNewspaper && this.health <= 200) {
                    this.hasNewspaper = false;
                    this.rageMode = true;
                    // 纸碎粒子由游戏循环生成
                    sound.playTone(150, 'sawtooth', 0.5, 450, 0.15); // 愤怒嘶吼声
                }

                return this.health <= 0;
            }

            slow() {
                this.slowTimer = 300; // 减速 5 秒 (60fps * 5)
            }

            update(plantsGrid, particleCallback) {
                this.frame++;

                // 减速计时器
                if (this.slowTimer > 0) {
                    this.slowTimer--;
                    this.speed = this.rageMode ? 0.35 : this.baseSpeed * 0.5; // 狂暴状态减速
                } else {
                    this.speed = this.rageMode ? 0.75 : this.baseSpeed; // 狂暴状态移动非常快
                }

                // 寻找前方是否有植物碰撞 (距离判定)
                let collides = false;
                let collidedPlant = null;
                let plantCol = -1;

                for (let c = 0; c < 9; c++) {
                    const plant = plantsGrid[this.row][c];
                    if (plant && this.x > plant.x && this.x - plant.x < 45) {
                        collides = true;
                        collidedPlant = plant;
                        plantCol = c;
                        break;
                    }
                }

                if (collides && collidedPlant) {
                    this.isEating = true;
                    // 啃咬伤害，每秒约 50 伤害
                    const eatingSpeed = this.slowTimer > 0 ? 0.4 : 0.8;
                    const isDead = collidedPlant.takeDamage(eatingSpeed);
                    if (isDead) {
                        plantsGrid[this.row][plantCol] = null;
                        this.isEating = false;
                    }
                    if (this.frame % 35 === 0) {
                        // 播放咀嚼声
                        sound.playTone(100 + Math.random()*50, 'triangle', 0.1, 0, 0.08);
                    }
                } else {
                    this.isEating = false;
                    this.x -= this.speed;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                const isSlowed = this.slowTimer > 0;
                
                // 身体与衣服颜色
                const suitColor = this.type === 'newspaper' ? '#5c6bc0' : '#4e342e';
                const skinColor = isSlowed ? '#64b5f6' : (this.rageMode ? '#e57373' : '#81c784');

                // 腿部摆动动画
                const swing = Math.sin(this.frame * (this.rageMode ? 0.3 : 0.12)) * 12 * Math.PI / 180;

                // 左腿
                ctx.save();
                ctx.translate(-4, 25);
                ctx.rotate(swing);
                ctx.fillStyle = '#37474f';
                ctx.fillRect(-5, 0, 10, 22);
                ctx.fillStyle = '#4e342e'; // 鞋子
                ctx.fillRect(-7, 20, 14, 6);
                ctx.restore();

                // 右腿
                ctx.save();
                ctx.translate(6, 25);
                ctx.rotate(-swing);
                ctx.fillStyle = '#37474f';
                ctx.fillRect(-5, 0, 10, 22);
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(-7, 20, 14, 6);
                ctx.restore();

                // 躯干
                ctx.fillStyle = suitColor;
                ctx.beginPath();
                ctx.ellipse(0, 5, 14, 26, 0.05, 0, Math.PI*2);
                ctx.fill();

                // 领口
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(-6, -15);
                ctx.lineTo(0, -5);
                ctx.lineTo(6, -15);
                ctx.closePath();
                ctx.fill();

                // 手臂 (伸向前方)
                ctx.save();
                ctx.translate(-10, -5);
                const armAngle = Math.sin(this.frame * 0.08) * 0.1 - 0.8;
                ctx.rotate(armAngle);
                ctx.fillStyle = suitColor;
                ctx.fillRect(-22, -6, 24, 10);
                // 绿色手掌
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(-22, -1, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();

                // 头部 bobbing
                const headBob = Math.sin(this.frame * 0.1) * 2.5;
                ctx.translate(0, -25 + headBob);

                // 头部
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(0, 0, 19, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-5, -4, 5, 0, Math.PI*2); // 左眼
                ctx.arc(5, -2, 7, 0, Math.PI*2);  // 右眼大，营造呆萌感
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-5, -4, 2, 0, Math.PI*2);
                ctx.arc(5, -2, 2.5, 0, Math.PI*2);
                ctx.fill();

                // 嘴巴 (呆滞微笑 / 露出几颗小门牙)
                ctx.strokeStyle = '#3e2723';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(2, 6, 7, 0.2, Math.PI - 0.2);
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 8, 3, 3); // 呆萌牙齿
                ctx.fillRect(4, 7, 2, 3);

                // 头顶配饰绘制
                if (this.type === 'conehead' && this.health > 200) {
                    const coneRatio = (this.health - 200) / 300;
                    ctx.save();
                    ctx.translate(0, -18);
                    ctx.fillStyle = '#ff9800'; // 橘色路障
                    ctx.strokeStyle = '#e65100';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-16, 6);
                    ctx.lineTo(-6, -26);
                    ctx.lineTo(6, -26);
                    ctx.lineTo(16, 6);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // 底座
                    ctx.fillRect(-22, 6, 44, 4);

                    // 涂刷反光条
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(-10, -5);
                    ctx.lineTo(-8, -12);
                    ctx.lineTo(8, -12);
                    ctx.lineTo(10, -5);
                    ctx.closePath();
                    ctx.fill();

                    // 路障受损裂纹
                    if (coneRatio < 0.6) {
                        ctx.strokeStyle = '#3e2723';
                        ctx.beginPath();
                        ctx.moveTo(-5, -20); ctx.lineTo(0, -12); ctx.lineTo(-3, -5);
                        ctx.stroke();
                    }

                    ctx.restore();
                } 
                else if (this.type === 'buckethead' && this.health > 200) {
                    const bucketRatio = (this.health - 200) / 900;
                    ctx.save();
                    ctx.translate(0, -13);
                    ctx.fillStyle = '#cfd8dc'; // 金属银灰
                    ctx.strokeStyle = '#78909c';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-16, 3);
                    ctx.lineTo(-14, -20);
                    ctx.lineTo(14, -20);
                    ctx.lineTo(16, 3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // 桶提手和边缘
                    ctx.strokeRect(-18, 1, 36, 2);

                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fillRect(-10, -18, 5, 18);

                    // 凹陷和磨损
                    if (bucketRatio < 0.6) {
                        ctx.strokeStyle = '#37474f';
                        ctx.beginPath();
                        ctx.moveTo(8, -15); ctx.lineTo(6, -10); ctx.lineTo(10, -8);
                        ctx.stroke();
                    }

                    ctx.restore();
                } 
                else if (this.type === 'newspaper') {
                    // 绘制报纸 (在身子前面)
                    if (this.hasNewspaper) {
                        ctx.save();
                        ctx.translate(-24, 15); // 手腕前
                        ctx.fillStyle = '#eceff1'; // 报纸底色
                        ctx.strokeStyle = '#b0bec5';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.rect(-10, -14, 26, 24);
                        ctx.fill();
                        ctx.stroke();

                        // 报纸折叠痕与文字横线
                        ctx.strokeStyle = '#cfd8dc';
                        ctx.beginPath();
                        ctx.moveTo(3, -14);
                        ctx.lineTo(3, 10);
                        ctx.stroke();

                        ctx.fillStyle = '#90a4ae';
                        ctx.fillRect(-6, -10, 6, 2);
                        ctx.fillRect(-6, -6, 7, 1.5);
                        ctx.fillRect(-6, -2, 5, 1.5);
                        ctx.fillRect(5, -10, 6, 1.5);
                        ctx.fillRect(5, -6, 5, 1.5);
                        ctx.fillRect(5, -2, 7, 2);
                        ctx.restore();
                    }
                }

                ctx.restore();

                // 绘制僵尸血量条 (当戴头盔且受损时展示)
                if (this.health < this.maxHealth) {
                    ctx.save();
                    const barW = 40;
                    const barH = 4;
                    const bx = this.x - barW / 2;
                    const by = this.y - 58;
                    const hpRatio = this.health / this.maxHealth;

                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(bx, by, barW, barH);
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(bx, by, barW * hpRatio, barH);
                    ctx.restore();
                }
            }
        }

        class Projectile {
            constructor(x, y, row, isIce = false) {
                this.x = x;
                this.y = y;
                this.row = row;
                this.isIce = isIce;
                this.speed = 4.5;
                this.damage = 20;
                this.radius = 8;
            }

            update() {
                this.x += this.speed;
                return this.x > 1020; // 飞出画面销毁
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 绘制拖尾
                const trailGrad = ctx.createLinearGradient(-15, 0, 0, 0);
                trailGrad.addColorStop(0, 'transparent');
                trailGrad.addColorStop(1, this.isIce ? 'rgba(0, 188, 212, 0.4)' : 'rgba(76, 175, 80, 0.4)');
                ctx.fillStyle = trailGrad;
                ctx.fillRect(-15, -this.radius*0.8, 15, this.radius*1.6);

                // 豌豆珠本体
                ctx.fillStyle = this.isIce ? '#00bcd4' : '#4caf50';
                ctx.strokeStyle = this.isIce ? '#e0f7fa' : '#c8e6c9';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();

                // 亮光高光点
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-this.radius*0.3, -this.radius*0.3, this.radius*0.25, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Lawnmower {
            constructor(row) {
                this.row = row;
                this.x = 25; // 停靠在第0列左侧
                this.y = row * 100 + 150;
                this.state = 'idle'; // 'idle', 'running', 'exhausted'
                this.speed = 7;
                this.spinAngle = 0;
            }

            trigger() {
                this.state = 'running';
                sound.playMower();
            }

            update(zombies, particleCallback) {
                if (this.state === 'running') {
                    this.x += this.speed;
                    this.spinAngle += 0.3;

                    // 尘土粒子效果
                    if (Math.random() < 0.4) {
                        particleCallback(this.x - 10, this.y + 10, -2, -1 - Math.random()*2, '#a1887f', 4 + Math.random()*4, 25);
                    }

                    // 沿途碾压这行所有僵尸
                    zombies.forEach(z => {
                        if (z.row === this.row && Math.abs(z.x - this.x) < 40) {
                            z.health = 0; // 碾毙
                            sound.playHit();
                            // 喷溅绿色粒子
                            for (let i = 0; i < 8; i++) {
                                particleCallback(z.x, z.y, (Math.random() - 0.3) * 6, (Math.random() - 0.5) * 6, '#81c784', 3 + Math.random()*4, 30);
                            }
                        }
                    });

                    if (this.x > 1020) {
                        this.state = 'exhausted';
                    }
                }
            }

            draw(ctx) {
                if (this.state === 'exhausted') return;

                ctx.save();
                ctx.translate(this.x, this.y);

                // 车身底盘 (深红)
                ctx.fillStyle = '#b71c1c';
                ctx.strokeStyle = '#5d0000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-25, 10);
                ctx.lineTo(-20, -10);
                ctx.lineTo(15, -10);
                ctx.lineTo(25, 10);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 侧边装饰条 (亮黄)
                ctx.fillStyle = '#facc15';
                ctx.fillRect(-15, -4, 25, 4);

                // 车轮 (黑圈 + 银轴)
                const wheels = [-14, 14];
                wheels.forEach(wx => {
                    ctx.fillStyle = '#212121';
                    ctx.beginPath();
                    ctx.arc(wx, 12, 10, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#9e9e9e';
                    ctx.beginPath();
                    ctx.arc(wx, 12, 4, 0, Math.PI*2);
                    ctx.fill();
                });

                // 排气管与白烟
                ctx.fillStyle = '#424242';
                ctx.fillRect(-22, -18, 5, 10);
                if (this.state === 'running' && Math.random() < 0.25) {
                    ctx.fillStyle = 'rgba(240, 240, 240, 0.6)';
                    ctx.beginPath();
                    ctx.arc(-20 + (Math.random() - 0.5) * 6, -24, 6 + Math.random() * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 前端旋转切割刀片 (银灰色)
                ctx.save();
                ctx.translate(28, 5);
                ctx.rotate(this.spinAngle);
                ctx.fillStyle = '#b0bec5';
                ctx.strokeStyle = '#37474f';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // 刀齿线
                ctx.strokeStyle = '#eceff1';
                ctx.lineWidth = 2;
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
                    ctx.stroke();
                }
                ctx.restore();

                ctx.restore();
            }
        }

        class Sun {
            constructor(x, y, fromSunflower = false) {
                this.x = x;
                this.y = y;
                this.value = 25;
                this.frame = Math.floor(Math.random() * 100);
                
                // 运动状态: 'falling', 'resting', 'collecting'
                this.state = 'falling';
                
                if (fromSunflower) {
                    // 向日葵产生的阳光：微弱抛物线喷出
                    this.state = 'resting';
                    this.targetY = y + 15 + Math.random() * 15;
                    this.vy = -3 - Math.random() * 2;
                    this.vx = (Math.random() - 0.5) * 4;
                    this.gravity = 0.25;
                } else {
                    // 天空掉落：垂直掉落到随机高度
                    this.targetY = 150 + Math.random() * 380;
                    this.speed = 1.2 + Math.random() * 0.8;
                }

                this.restTimer = 480; // 地面停留 8 秒 (60fps * 8)
                
                // 收集终点 (HUD 左上角阳光余额位置)
                this.collectTargetX = 50;
                this.collectTargetY = 50;
            }

            collect() {
                if (this.state === 'collecting') return;
                this.state = 'collecting';
                sound.playCollect();
            }

            update() {
                this.frame++;

                if (this.state === 'falling') {
                    this.y += this.speed;
                    if (this.y >= this.targetY) {
                        this.state = 'resting';
                    }
                } 
                else if (this.state === 'resting') {
                    // 抛物线运动
                    if (this.vy !== undefined) {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vy += this.gravity;
                        if (this.y >= this.targetY) {
                            this.y = this.targetY;
                            this.vy = undefined;
                        }
                    }
                    this.restTimer--;
                    if (this.restTimer <= 0) {
                        return true; // 超时自动消失
                    }
                } 
                else if (this.state === 'collecting') {
                    // 平滑追逐左上角目标
                    const dx = this.collectTargetX - this.x;
                    const dy = this.collectTargetY - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 15) {
                        return 'arrived'; // 收集完成
                    }
                    this.x += (dx / dist) * 14;
                    this.y += (dy / dist) * 14;
                }
                return false;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 阳光闪耀旋转角
                const rot = this.frame * 0.02;
                ctx.rotate(rot);

                // 外发光晕
                const outerR = 26 + Math.sin(this.frame * 0.15) * 4;
                const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, outerR);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.3, '#fef08a');
                grad.addColorStop(0.7, 'rgba(253, 224, 71, 0.4)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, outerR, 0, Math.PI * 2);
                ctx.fill();

                // 绘制太阳角（8个小三角形）
                ctx.fillStyle = '#facc15';
                for (let i = 0; i < 8; i++) {
                    ctx.save();
                    ctx.rotate(i * Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(0, -12);
                    ctx.lineTo(-6, -20);
                    ctx.lineTo(6, -20);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                // 中心圆球
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, size, maxLife, type = 'normal') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = maxLife;
                this.maxLife = maxLife;
                this.type = type; // 'normal', 'text', 'fire'
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                if (this.type === 'fire') {
                    this.size *= 0.95; // 火焰逐渐变小
                }
                return this.life <= 0;
            }

            draw(ctx) {
                ctx.save();
                const opacity = this.life / this.maxLife;
                ctx.globalAlpha = opacity;
                ctx.fillStyle = this.color;
                
                if (this.type === 'text') {
                    ctx.font = `bold ${this.size}px 'ZCOOL KuaiLe'`;
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 6;
                    ctx.textAlign = 'center';
                    ctx.fillText('BOOM!', this.x, this.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // ==========================================
        // 6. 核心游戏引擎
        // ==========================================
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.level = 1;
                this.gameState = 'menu'; // 'menu', 'playing', 'paused', 'gameover', 'victory'
                
                this.sun = 150;
                this.selectedPlant = null; // 'sunflower', 'peashooter' ...
                this.isShovelSelected = false;

                // 实体数组
                this.plantsGrid = Array.from({length: 5}, () => Array(9).fill(null));
                this.zombies = [];
                this.projectiles = [];
                this.lawnmowers = [];
                this.suns = [];
                this.particles = [];

                // 冷却追踪
                this.cooldowns = {
                    sunflower: { lastPlaced: 0 },
                    peashooter: { lastPlaced: 0 },
                    wallnut: { lastPlaced: 0 },
                    snowpea: { lastPlaced: 0 },
                    cherrybomb: { lastPlaced: 0 }
                };

                // 关卡进度控制
                this.zombiesSpawned = 0;
                this.zombiesKilled = 0;
                this.waveProgress = 0;
                this.levelConfig = null;
                this.lastSpawnTime = 0;
                this.nextSpawnInterval = 10000;
                
                // 交互层：鼠标物理位置
                this.mouseX = 0;
                this.mouseY = 0;
                this.isHoveringGrid = false;
                this.hoverCol = -1;
                this.hoverRow = -1;

                this.shakeTime = 0; // 屏幕抖动定时

                this.bindEvents();
            }

            // 初始化关卡数据
            initLevel(lv) {
                this.level = lv;
                this.levelConfig = LEVEL_CONFIGS[lv];
                this.sun = 150;
                this.selectedPlant = null;
                this.isShovelSelected = false;

                // 清空实体
                this.plantsGrid = Array.from({length: 5}, () => Array(9).fill(null));
                this.zombies = [];
                this.projectiles = [];
                this.suns = [];
                this.particles = [];
                
                // 冷却重置
                Object.keys(this.cooldowns).forEach(k => {
                    this.cooldowns[k].lastPlaced = 0;
                });

                // 初始化割草机
                this.lawnmowers = [];
                for (let r = 0; r < 5; r++) {
                    this.lawnmowers.push(new Lawnmower(r));
                }

                this.zombiesSpawned = 0;
                this.zombiesKilled = 0;
                this.waveProgress = 0;
                this.lastSpawnTime = Date.now() + 5000; // 前5秒安全期
                this.nextSpawnInterval = this.levelConfig.spawnDelay;

                this.updateUI();
                this.renderCardsPanel();
            }

            updateUI() {
                // 阳光数量更新
                document.getElementById('sun-amount').innerText = this.sun;

                // 冷却遮罩与卡片不可用状态控制
                const cards = document.querySelectorAll('.card');
                const now = Date.now();
                cards.forEach(card => {
                    const type = card.dataset.type;
                    const meta = PLANT_TYPES[type];
                    const cdState = this.cooldowns[type];
                    const elapsed = now - cdState.lastPlaced;
                    const cdRemaining = Math.max(0, meta.cooldown - elapsed);

                    // 控制卡片可买状态
                    if (this.sun < meta.cost) {
                        card.classList.add('disabled');
                    } else {
                        card.classList.remove('disabled');
                    }

                    // 控制遮罩高度百分比
                    const overlay = card.querySelector('.card-cooldown-overlay');
                    if (cdRemaining > 0) {
                        card.classList.add('disabled'); // 冷却中不可点击
                        const ratio = (cdRemaining / meta.cooldown) * 100;
                        overlay.style.height = `${ratio}%`;
                        overlay.innerText = Math.ceil(cdRemaining / 1000) + 's';
                    } else {
                        overlay.style.height = '0%';
                        overlay.innerText = '';
                    }
                });

                // 进度条更新
                const percent = Math.min(100, Math.floor((this.zombiesKilled / this.levelConfig.zombieCount) * 100));
                document.getElementById('level-progress-bar').style.width = `${percent}%`;
                document.getElementById('level-progress-txt').innerText = `防线进度: ${percent}%`;

                // 铲子选中高亮
                const shovel = document.getElementById('shovel-btn');
                if (this.isShovelSelected) {
                    shovel.classList.add('selected');
                } else {
                    shovel.classList.remove('selected');
                }
            }

            // 动态绘制卡片并注入面板
            renderCardsPanel() {
                const container = document.getElementById('cards-container');
                container.innerHTML = ''; // 清空

                this.levelConfig.plantUnlocks.forEach(type => {
                    const meta = PLANT_TYPES[type];
                    const card = document.createElement('div');
                    card.className = `card ${this.sun < meta.cost ? 'disabled' : ''}`;
                    card.dataset.type = type;
                    card.setAttribute('draggable', 'false');
                    card.addEventListener('dragstart', (e) => e.preventDefault());
                    
                    // 内嵌卡片绘制小画布
                    const canvas = document.createElement('canvas');
                    canvas.className = 'card-preview';
                    canvas.width = 60;
                    canvas.height = 60;
                    canvas.setAttribute('draggable', 'false');
                    const ctx = canvas.getContext('2d');
                    
                    // 居中渲染预览图
                    if (type === 'sunflower') DrawUtils.drawSunflowerCard(ctx, 30, 30, 52);
                    else if (type === 'peashooter') DrawUtils.drawPeashooterCard(ctx, 30, 30, 52, 0, false);
                    else if (type === 'snowpea') DrawUtils.drawPeashooterCard(ctx, 30, 30, 52, 0, true);
                    else if (type === 'wallnut') DrawUtils.drawWallNutCard(ctx, 30, 30, 52);
                    else if (type === 'cherrybomb') DrawUtils.drawCherryBombCard(ctx, 30, 30, 52);

                    card.appendChild(canvas);

                    // 卡片价格
                    const priceLabel = document.createElement('span');
                    priceLabel.className = 'card-price';
                    priceLabel.innerText = meta.cost;
                    card.appendChild(priceLabel);

                    // 冷却遮罩
                    const cdOverlay = document.createElement('div');
                    cdOverlay.className = 'card-cooldown-overlay';
                    card.appendChild(cdOverlay);

                    // 注册事件
                    card.addEventListener('click', () => {
                        if (this.gameState !== 'playing') return;
                        if (card.classList.contains('disabled')) return;
                        sound.playSelect();
                        
                        if (this.selectedPlant === type) {
                            // 如果再次点击已选中的卡片，则取消选择
                            this.selectedPlant = null;
                            card.classList.remove('selected');
                        } else {
                            this.selectedPlant = type;
                            this.isShovelSelected = false; // 取消铲子
                            
                            // 高亮当前选中的植物卡片
                            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                        }
                        this.updateUI();
                    });

                    container.appendChild(card);
                });
            }

            spawnSun(x, y, fromSunflower = false) {
                this.suns.push(new Sun(x, y, fromSunflower));
            }

            spawnProjectile(x, y, row, isIce = false) {
                this.projectiles.push(new Projectile(x, y, row, isIce));
                sound.playShoot();
            }

            spawnParticle(x, y, vx, vy, color, size, maxLife, type = 'normal') {
                this.particles.push(new Particle(x, y, vx, vy, color, size, maxLife, type));
            }

            triggerShake() {
                this.shakeTime = 18; // 抖动 18 帧
                document.getElementById('game-wrapper').classList.add('screen-shake');
            }

            showCenterMessage(text, duration = 2000) {
                const overlay = document.getElementById('message-overlay');
                overlay.innerText = text;
                overlay.style.opacity = '1';
                setTimeout(() => {
                    overlay.style.opacity = '0';
                }, duration);
            }

            bindEvents() {
                // 开始按钮
                document.getElementById('start-btn').addEventListener('click', () => {
                    sound.init();
                    sound.playSelect();
                    document.getElementById('start-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('start-screen').style.display = 'none';
                        document.getElementById('game-container').style.display = 'flex';
                        this.gameState = 'playing';
                        this.initLevel(this.level);
                    }, 500);
                });

                // 关卡切换
                document.querySelectorAll('.level-select-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        sound.playSelect();
                        document.querySelectorAll('.level-select-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.level = parseInt(btn.dataset.level);
                    });
                });

                // 暂停控制
                document.getElementById('pause-btn').addEventListener('click', () => {
                    if (this.gameState !== 'playing') return;
                    sound.playSelect();
                    this.gameState = 'paused';
                    document.getElementById('pause-screen').classList.add('active');
                });
                document.getElementById('resume-btn').addEventListener('click', () => {
                    sound.playSelect();
                    this.gameState = 'playing';
                    document.getElementById('pause-screen').classList.remove('active');
                });

                // 返回/退出
                const exitHandler = () => {
                    sound.playSelect();
                    this.gameState = 'menu';
                    document.getElementById('pause-screen').classList.remove('active');
                    document.getElementById('lose-screen').classList.remove('active');
                    document.getElementById('win-screen').classList.remove('active');
                    document.getElementById('game-container').style.display = 'none';
                    document.getElementById('start-screen').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('start-screen').style.opacity = '1';
                    }, 50);
                };
                document.getElementById('exit-btn').addEventListener('click', exitHandler);
                document.getElementById('pause-exit-btn').addEventListener('click', exitHandler);
                document.getElementById('lose-exit-btn').addEventListener('click', exitHandler);
                document.getElementById('win-exit-btn').addEventListener('click', exitHandler);

                // 重新开始
                const restartHandler = () => {
                    sound.playSelect();
                    document.getElementById('lose-screen').classList.remove('active');
                    document.getElementById('win-screen').classList.remove('active');
                    this.gameState = 'playing';
                    this.initLevel(this.level);
                };
                document.getElementById('restart-btn').addEventListener('click', restartHandler);
                document.getElementById('retry-btn').addEventListener('click', restartHandler);

                // 下一关
                document.getElementById('next-level-btn').addEventListener('click', () => {
                    sound.playSelect();
                    document.getElementById('win-screen').classList.remove('active');
                    this.gameState = 'playing';
                    if (this.level < 3) {
                        this.level++;
                        // 同步更新菜单上的选中关卡状态
                        document.querySelectorAll('.level-select-btn').forEach(b => {
                            b.classList.toggle('active', parseInt(b.dataset.level) === this.level);
                        });
                    }
                    this.initLevel(this.level);
                });

                // 铲子选中
                document.getElementById('shovel-btn').addEventListener('click', () => {
                    if (this.gameState !== 'playing') return;
                    sound.playSelect();
                    this.isShovelSelected = !this.isShovelSelected;
                    this.selectedPlant = null; // 清理植物卡片选择
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                    this.updateUI();
                });

                // 阻止铲子按钮的默认拖拽
                document.getElementById('shovel-btn').addEventListener('dragstart', (e) => e.preventDefault());

                // 右键取消选择植物或铲子
                this.canvas.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (this.gameState !== 'playing') return;
                    if (this.selectedPlant || this.isShovelSelected) {
                        this.selectedPlant = null;
                        this.isShovelSelected = false;
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        this.updateUI();
                    }
                });

                // 按 Escape 取消选择
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (this.gameState === 'playing' && (this.selectedPlant || this.isShovelSelected)) {
                            this.selectedPlant = null;
                            this.isShovelSelected = false;
                            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                            this.updateUI();
                        }
                    }
                });

                // 监听鼠标在 Canvas 的位置 (确定摆放预览格)
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouseX = e.clientX - rect.left;
                    this.mouseY = e.clientY - rect.top;

                    // 判断是否在格子里 (列 x:100~910, 行 y:100~600)
                    if (this.mouseX >= 100 && this.mouseX < 910 && this.mouseY >= 100 && this.mouseY < 600) {
                        this.isHoveringGrid = true;
                        this.hoverCol = Math.floor((this.mouseX - 100) / 90);
                        this.hoverRow = Math.floor((this.mouseY - 100) / 100);
                    } else {
                        this.isHoveringGrid = false;
                        this.hoverCol = -1;
                        this.hoverRow = -1;
                    }
                });

                this.canvas.addEventListener('mouseleave', () => {
                    this.isHoveringGrid = false;
                    this.hoverCol = -1;
                    this.hoverRow = -1;
                });

                // 点击草坪：种植、除草、收集阳光
                this.canvas.addEventListener('click', (e) => {
                    if (this.gameState !== 'playing') return;

                    const rect = this.canvas.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const clickY = e.clientY - rect.top;

                    // 1. 先探测是否点中阳光 (点中判定半径设为 35px 保证手感)
                    for (let i = this.suns.length - 1; i >= 0; i--) {
                        const sun = this.suns[i];
                        if (sun.state !== 'collecting') {
                            const dist = Math.hypot(sun.x - clickX, sun.y - clickY);
                            if (dist < 38) {
                                sun.collect();
                                return; // 拦截草坪种植/铲除逻辑
                            }
                        }
                    }

                    // 2. 网格操作
                    if (this.isHoveringGrid && this.hoverCol !== -1 && this.hoverRow !== -1) {
                        const existingPlant = this.plantsGrid[this.hoverRow][this.hoverCol];

                        if (this.isShovelSelected) {
                            // 铲除现有植物
                            if (existingPlant) {
                                sound.playPlant();
                                // 生成破碎叶片粒子
                                for(let i=0; i<6; i++) {
                                    this.spawnParticle(existingPlant.x, existingPlant.y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, '#4caf50', 3+Math.random()*3, 20);
                                }
                                this.plantsGrid[this.hoverRow][this.hoverCol] = null;
                                this.isShovelSelected = false;
                                this.updateUI();
                            }
                        } 
                        else if (this.selectedPlant) {
                            // 种植新植物
                            const meta = PLANT_TYPES[this.selectedPlant];
                            // 检查格子和资源
                            if (!existingPlant && this.sun >= meta.cost) {
                                const now = Date.now();
                                const elapsed = now - this.cooldowns[this.selectedPlant].lastPlaced;
                                
                                if (elapsed >= meta.cooldown) {
                                    // 扣费、种植、进入冷却
                                    this.sun -= meta.cost;
                                    const newPlant = new Plant(this.selectedPlant, this.hoverCol, this.hoverRow);
                                    this.plantsGrid[this.hoverRow][this.hoverCol] = newPlant;
                                    this.cooldowns[this.selectedPlant].lastPlaced = now;

                                    sound.playPlant();
                                    
                                    // 种植飞溅尘土
                                    for(let i=0; i<8; i++) {
                                        this.spawnParticle(newPlant.x, newPlant.y + 25, (Math.random()-0.5)*3, -Math.random()*2, '#8d6e63', 2+Math.random()*3, 18);
                                    }

                                    this.selectedPlant = null;
                                    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                                    this.updateUI();
                                }
                            }
                        }
                    }
                });
            }

            // ==========================================
            // 7. 僵尸波次生成引擎
            // ==========================================
            updateSpawner() {
                if (this.zombiesSpawned >= this.levelConfig.zombieCount) {
                    // 全部僵尸已生成，当场面僵尸也被消灭完时，视为胜利
                    if (this.zombies.length === 0 && this.gameState === 'playing') {
                        this.gameState = 'victory';
                        sound.playWinTheme();
                        
                        // 通关信息根据关卡更改
                        const winMsg = document.getElementById('victory-text');
                        const nextBtn = document.getElementById('next-level-btn');
                        if (this.level === 3) {
                            winMsg.innerText = "你已击退了全部强敌！保护了草坪的终极安宁！";
                            nextBtn.style.display = 'none'; // 满级，无下一关
                        } else {
                            winMsg.innerText = `恭喜通关关卡 ${this.level}！解锁了更多防线植物，请乘胜追击！`;
                            nextBtn.style.display = 'inline-block';
                        }
                        document.getElementById('win-screen').classList.add('active');
                    }
                    return;
                }

                const now = Date.now();
                if (now - this.lastSpawnTime > this.nextSpawnInterval) {
                    this.lastSpawnTime = now;

                    // 动态调整下一次生成的延迟 (随着生成数量加速)
                    const spawnRatio = this.zombiesSpawned / this.levelConfig.zombieCount;
                    this.nextSpawnInterval = this.levelConfig.spawnDelay - spawnRatio * (this.levelConfig.spawnDelay - this.levelConfig.minSpawnDelay);

                    // 决定是否生成一大波僵尸
                    const midWay = Math.floor(this.levelConfig.zombieCount / 2);
                    const finalWay = this.levelConfig.zombieCount - 1;
                    
                    let spawnCount = 1;
                    if (this.zombiesSpawned === midWay) {
                        this.showCenterMessage("一大波僵尸正在接近！");
                        sound.playGroan();
                        spawnCount = Math.floor(this.levelConfig.waveScale);
                    } else if (this.zombiesSpawned === finalWay) {
                        this.showCenterMessage("最后一波！");
                        sound.playGroan();
                        spawnCount = Math.floor(this.levelConfig.waveScale * 1.5);
                    }

                    for (let i = 0; i < spawnCount; i++) {
                        if (this.zombiesSpawned >= this.levelConfig.zombieCount) break;
                        this.spawnZombie();
                    }
                }
            }

            spawnZombie() {
                // 随机安排行 (0~4)
                const row = Math.floor(Math.random() * 5);
                
                // 随机挑选池里已解锁的僵尸类型
                const types = this.levelConfig.zombieTypes;
                const randType = types[Math.floor(Math.random() * types.length)];
                
                const z = new Zombie(randType, row);
                // 安排微小排队错落防堆叠
                z.x += (Math.random() - 0.5) * 50; 
                this.zombies.push(z);
                this.zombiesSpawned++;
                this.updateUI();
                
                if (Math.random() < 0.4) {
                    sound.playGroan();
                }
            }

            // ==========================================
            // 8. 物理世界碰撞 & 数据循环更新
            // ==========================================
            updatePhysics() {
                // 1. 掉落阳光产生器
                if (Math.random() < 0.005) { // 每秒约 30% 概率掉落一个阳光
                    const sunX = 150 + Math.random() * 750;
                    this.spawnSun(sunX, 0, false);
                }

                // 2. 割草机更新
                this.lawnmowers.forEach(mower => {
                    mower.update(this.zombies, this.spawnParticle.bind(this));
                });

                // 3. 粒子系统更新
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const isDead = this.particles[i].update();
                    if (isDead) this.particles.splice(i, 1);
                }

                // 4. 阳光更新
                for (let i = this.suns.length - 1; i >= 0; i--) {
                    const result = this.suns[i].update();
                    if (result === 'arrived') {
                        // 阳光入账
                        this.sun += this.suns[i].value;
                        this.suns.splice(i, 1);
                        this.updateUI();
                        // 阳光入账微小粒子群
                        for (let k = 0; k < 6; k++) {
                            this.spawnParticle(50, 50, (Math.random()-0.5)*4, (Math.random()-0.5)*4, '#fffbaf', 2.5, 12);
                        }
                    } else if (result === true) {
                        this.suns.splice(i, 1); // 消失
                    }
                }

                // 5. 植物格子更新
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 9; c++) {
                        const plant = this.plantsGrid[r][c];
                        if (plant) {
                            const triggerExplode = plant.update(
                                this.zombies,
                                this.spawnSun.bind(this),
                                this.spawnProjectile.bind(this)
                            );

                            if (triggerExplode) {
                                // 樱桃炸弹爆破
                                this.explodeCherry(plant);
                                this.plantsGrid[r][c] = null; // 销毁自身
                            }
                        }
                    }
                }

                // 6. 子弹飞行与伤害检测
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const proj = this.projectiles[i];
                    const outOfScreen = proj.update();
                    
                    if (outOfScreen) {
                        this.projectiles.splice(i, 1);
                        continue;
                    }

                    // 检测碰撞僵尸
                    let collided = false;
                    for (let z = 0; z < this.zombies.length; z++) {
                        const zombie = this.zombies[z];
                        if (zombie.row === proj.row && Math.abs(zombie.x - proj.x) < 25) {
                            collided = true;
                            sound.playHit();
                            
                            // 记录受击前的报纸状态
                            const hadNewspaper = zombie.hasNewspaper;
                            
                            // 伤害结算
                            const isDead = zombie.takeDamage(proj.damage);
                            
                            // 减量检测
                            if (proj.isIce) {
                                zombie.slow();
                            }

                            // 豌豆撞击火花粒子
                            const pColor = proj.isIce ? '#00e5ff' : '#a5d6a7';
                            for (let k = 0; k < 4; k++) {
                                this.spawnParticle(proj.x, proj.y, (Math.random()-0.3)*3, (Math.random()-0.5)*4, pColor, 2+Math.random()*2, 12);
                            }

                            // 如果报纸在此次攻击中被打碎，生成报纸碎屑粒子
                            if (hadNewspaper && !zombie.hasNewspaper) {
                                for (let p = 0; p < 12; p++) {
                                    this.spawnParticle(zombie.x, zombie.y, (Math.random()-0.5)*5, -Math.random()*4, '#f8fafc', 2.5 + Math.random()*3, 30);
                                }
                            }

                            if (isDead) {
                                this.killZombie(z);
                            }
                            break;
                        }
                    }

                    if (collided) {
                        this.projectiles.splice(i, 1);
                    }
                }

                // 7. 僵尸移动与行为结算
                for (let i = this.zombies.length - 1; i >= 0; i--) {
                    const zombie = this.zombies[i];
                    zombie.update(this.plantsGrid, this.spawnParticle.bind(this));

                    // 临界突破检测
                    if (zombie.x < 10) {
                        // 看看割草机能否救援
                        const mower = this.lawnmowers[zombie.row];
                        if (mower.state === 'idle') {
                            mower.trigger();
                        } else if (mower.state === 'exhausted') {
                            // 割草机已使用完，僵尸吃掉脑子，输掉游戏
                            this.gameState = 'gameover';
                            sound.playLoseTheme();
                            document.getElementById('lose-screen').classList.add('active');
                            break;
                        }
                    }
                }
            }

            // 樱桃炸弹爆破 3x3 网格
            explodeCherry(plant) {
                sound.playExplosion();
                this.triggerShake();

                const targetRowMin = Math.max(0, plant.row - 1);
                const targetRowMax = Math.min(4, plant.row + 1);
                const targetColMin = Math.max(0, plant.col - 1);
                const targetColMax = Math.min(8, plant.col + 1);

                // 划定网格物理范围
                const leftX = targetColMin * 90 + 100;
                const rightX = targetColMax * 90 + 190;

                // 爆破火浪粒子
                const centerX = plant.x;
                const centerY = plant.y;
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = 2 + Math.random() * 8;
                    const vx = Math.cos(angle) * spd;
                    const vy = Math.sin(angle) * spd;
                    const isYellow = Math.random() < 0.6;
                    this.spawnParticle(centerX, centerY, vx, vy, isYellow ? '#ffeb3b' : '#ff3d00', 8 + Math.random() * 12, 35, 'fire');
                }

                // 大字标识粒子
                this.spawnParticle(centerX, centerY - 20, 0, -0.5, '#ffea00', 36, 45, 'text');

                // 筛选范围内的僵尸进行爆破毁灭
                for (let i = this.zombies.length - 1; i >= 0; i--) {
                    const z = this.zombies[i];
                    if (z.row >= targetRowMin && z.row <= targetRowMax && z.x >= leftX - 40 && z.x <= rightX + 40) {
                        z.takeDamage(1800); // 绝对毁灭级杀伤
                        
                        // 炸裂黑色碳化烟雾粒子
                        for (let k = 0; k < 6; k++) {
                            this.spawnParticle(z.x, z.y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, '#212121', 4+Math.random()*6, 30);
                        }

                        if (z.health <= 0) {
                            this.killZombie(i);
                        }
                    }
                }
            }

            killZombie(idx) {
                const zombie = this.zombies[idx];
                
                // 飞起掉落的头颅粒子
                this.spawnParticle(zombie.x, zombie.y - 25, -1 - Math.random()*2, -3 - Math.random()*3, this.rageMode ? '#e57373' : '#81c784', 6, 40);

                this.zombies.splice(idx, 1);
                this.zombiesKilled++;
                this.updateUI();
            }

            // ==========================================
            // 9. 画面绘制逻辑
            // ==========================================
            draw() {
                // 抖动效果处理
                this.ctx.save();
                if (this.shakeTime > 0) {
                    this.shakeTime--;
                    const sx = (Math.random() - 0.5) * 8;
                    const sy = (Math.random() - 0.5) * 8;
                    this.ctx.translate(sx, sy);
                    if (this.shakeTime === 0) {
                        document.getElementById('game-wrapper').classList.remove('screen-shake');
                    }
                }

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // 1. 草坪背景棋盘格
                this.drawLawn();

                // 2. 铲子/种植网格辅助线 & 预览预览框
                this.drawGridPreview();

                // 3. 割草机
                this.lawnmowers.forEach(m => m.draw(this.ctx));

                // 4. 植物绘制
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 9; c++) {
                        const plant = this.plantsGrid[r][c];
                        if (plant) {
                            plant.draw(this.ctx);
                        }
                    }
                }

                // 5. 子弹飞行物
                this.projectiles.forEach(p => p.draw(this.ctx));

                // 6. 僵尸绘制
                this.zombies.forEach(z => z.draw(this.ctx));

                // 7. 粒子效果
                this.particles.forEach(p => p.draw(this.ctx));

                // 8. 漂浮阳光
                this.suns.forEach(s => s.draw(this.ctx));

                // 9. 鼠标跟随的浮动植物/铲子 (当不在草坪网格内时，在鼠标位置绘制半透明悬浮物)
                this.drawFloatingSelection();

                this.ctx.restore();
            }

            drawLawn() {
                // 草坪绿棋盘格
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 9; c++) {
                        // 棋盘格交替色，使用 HSL 配色营造自然质感
                        this.ctx.fillStyle = (r + c) % 2 === 0 ? '#1b5e20' : '#1b521f';
                        this.ctx.fillRect(c * 90 + 100, r * 100 + 100, 90, 100);

                        // 绘制零星的小草苗，使草坪显得生机勃勃
                        this.ctx.fillStyle = (r + c) % 2 === 0 ? '#2e7d32' : '#1b5e20';
                        this.ctx.beginPath();
                        this.ctx.moveTo(c * 90 + 115, r * 100 + 170);
                        this.ctx.lineTo(c * 90 + 120, r * 100 + 155);
                        this.ctx.lineTo(c * 90 + 124, r * 100 + 170);
                        this.ctx.fill();
                    }
                }

                // 泥土边界线 (最右侧草坪边缘)
                this.ctx.fillStyle = '#3e2723';
                this.ctx.fillRect(910, 100, 90, 500);

                // 左侧安全边（割草机停靠站）
                this.ctx.fillStyle = '#37474f';
                this.ctx.fillRect(0, 100, 100, 500);
                // 侧边纹理
                this.ctx.strokeStyle = '#263238';
                this.ctx.lineWidth = 2;
                for (let y = 100; y <= 600; y += 50) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(100, y);
                    this.ctx.stroke();
                }
                
                // 金色草坪隔离边界
                this.ctx.fillStyle = '#facc15';
                this.ctx.fillRect(98, 100, 4, 500);
            }

            drawFloatingSelection() {
                if (this.selectedPlant) {
                    this.ctx.save();
                    this.ctx.globalAlpha = 0.6; // 60% 透明度
                    
                    // 仅在不在网格内（例如在 HUD、割草机区域、草坪外侧泥地）时画在鼠标位置
                    if (!this.isHoveringGrid) {
                        const mx = this.mouseX;
                        const my = this.mouseY;
                        if (this.selectedPlant === 'sunflower') DrawUtils.drawSunflowerCard(this.ctx, mx, my, 80, 0);
                        else if (this.selectedPlant === 'peashooter') DrawUtils.drawPeashooterCard(this.ctx, mx, my, 80, 0, false);
                        else if (this.selectedPlant === 'snowpea') DrawUtils.drawPeashooterCard(this.ctx, mx, my, 80, 0, true);
                        else if (this.selectedPlant === 'wallnut') DrawUtils.drawWallNutCard(this.ctx, mx, my, 80, 1);
                        else if (this.selectedPlant === 'cherrybomb') DrawUtils.drawCherryBombCard(this.ctx, mx, my, 80, 0, 0);
                    }
                    this.ctx.restore();
                } else if (this.isShovelSelected) {
                    // 如果选中了铲子且不在网格内，绘制随鼠移动的铁铲图标
                    if (!this.isHoveringGrid) {
                        this.ctx.save();
                        this.ctx.translate(this.mouseX + 10, this.mouseY - 10); // 稍微偏置避开鼠标指针
                        
                        // 铲面 (银灰)
                        this.ctx.fillStyle = '#cbd5e1';
                        this.ctx.strokeStyle = '#64748b';
                        this.ctx.lineWidth = 2;
                        this.ctx.beginPath();
                        this.ctx.moveTo(-6, -6);
                        this.ctx.lineTo(6, -6);
                        this.ctx.lineTo(8, 6);
                        this.ctx.lineTo(-8, 6);
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.stroke();

                        // 铲把 (木褐色)
                        this.ctx.strokeStyle = '#a1887f';
                        this.ctx.lineWidth = 4.5;
                        this.ctx.lineCap = 'round';
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, -6);
                        this.ctx.lineTo(-12, -22);
                        this.ctx.stroke();

                        // 握手柄 (金属圈)
                        this.ctx.fillStyle = '#64748b';
                        this.ctx.beginPath();
                        this.ctx.arc(-12, -22, 4, 0, Math.PI*2);
                        this.ctx.fill();
                        
                        this.ctx.restore();
                    }
                }
            }

            drawGridPreview() {
                if (!this.isHoveringGrid) return;
                
                const px = this.hoverCol * 90 + 100;
                const py = this.hoverRow * 100 + 100;
                const existing = this.plantsGrid[this.hoverRow][this.hoverCol];

                this.ctx.save();
                if (this.isShovelSelected) {
                    // 铲除状态：红色框
                    this.ctx.strokeStyle = '#ef4444';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeRect(px + 4, py + 4, 82, 92);
                    this.ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
                    this.ctx.fillRect(px + 4, py + 4, 82, 92);
                } 
                else if (this.selectedPlant) {
                    const meta = PLANT_TYPES[this.selectedPlant];
                    const now = Date.now();
                    const elapsed = now - this.cooldowns[this.selectedPlant].lastPlaced;
                    const isCooldown = elapsed < meta.cooldown;

                    if (existing || this.sun < meta.cost || isCooldown) {
                        // 占位/余额不足/冷却：虚线红框
                        this.ctx.strokeStyle = '#ef4444';
                        this.ctx.lineWidth = 2;
                        this.ctx.setLineDash([5, 5]);
                        this.ctx.strokeRect(px + 4, py + 4, 82, 92);
                    } else {
                        // 可以种植：绿框 + 半透明预览
                        this.ctx.strokeStyle = '#22c55e';
                        this.ctx.lineWidth = 2.5;
                        this.ctx.strokeRect(px + 4, py + 4, 82, 92);
                        
                        // 绘制种植投影
                        this.ctx.globalAlpha = 0.5;
                        const centerX = px + 45;
                        const centerY = py + 50;
                        if (this.selectedPlant === 'sunflower') DrawUtils.drawSunflowerCard(this.ctx, centerX, centerY, 80, 0);
                        else if (this.selectedPlant === 'peashooter') DrawUtils.drawPeashooterCard(this.ctx, centerX, centerY, 80, 0, false);
                        else if (this.selectedPlant === 'snowpea') DrawUtils.drawPeashooterCard(this.ctx, centerX, centerY, 80, 0, true);
                        else if (this.selectedPlant === 'wallnut') DrawUtils.drawWallNutCard(this.ctx, centerX, centerY, 80, 1);
                        else if (this.selectedPlant === 'cherrybomb') DrawUtils.drawCherryBombCard(this.ctx, centerX, centerY, 80, 0, 0);
                    }
                }
                this.ctx.restore();
            }

            // ==========================================
            // 10. 游戏循环入口
            // ==========================================
            run() {
                const tick = () => {
                    if (this.gameState === 'playing') {
                        this.updateSpawner();
                        this.updatePhysics();
                        this.draw();
                        
                        // 定期更新卡片冷却和余额
                        if (Math.random() < 0.05) {
                            this.updateUI();
                        }
                    } else if (this.gameState === 'paused' || this.gameState === 'gameover' || this.gameState === 'victory') {
                        // 暂停/结束时，静态渲染当前画面 (停止后台物理更新)
                        this.draw();
                    }
                    requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            }
        }

        // 实例化引擎并执行
        const engine = new GameEngine();
        engine.run();
    </script>
