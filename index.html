<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸 - 网页版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --card-active: #4caf50;
            --card-cooldown: rgba(0, 0, 0, 0.6);
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-yellow: #ffeb3b;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Outfit', 'ZCOOL KuaiLe', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        /* 游戏整体容器 */
        #game-wrapper {
            position: relative;
            width: 1000px;
            height: 720px;
            background: #020617;
            border: 4px solid #334155;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px rgba(74, 222, 128, 0.1);
            overflow: hidden;
        }

        /* 提示信息 */
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 49, 49, 0.8), 0 0 20px rgba(255, 49, 49, 0.5);
            font-family: 'ZCOOL KuaiLe', sans-serif;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid var(--neon-red);
        }

        /* 开始菜单 */
        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(239, 68, 68, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .game-title {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(180deg, #4ade80 0%, #15803d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(74, 222, 128, 0.4));
            margin-bottom: 5px;
            letter-spacing: 2px;
            animation: titlePulse 2s infinite ease-in-out;
        }

        .game-subtitle {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 50px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(74, 222, 128, 0.4)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(74, 222, 128, 0.6)); }
        }

        .menu-btn {
            background: linear-gradient(185deg, #16a34a 0%, #15803d 100%);
            color: white;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 28px;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            z-index: 2;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(22, 163, 74, 0.6), 0 0 15px rgba(74, 222, 128, 0.5), inset 0 -4px 0 rgba(0,0,0,0.2);
        }

        .menu-btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px -5px rgba(22, 163, 74, 0.4);
        }

        /* 关卡选择面板 */
        .level-panel {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            z-index: 2;
        }

        .level-select-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #475569;
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .level-select-btn.active {
            border-color: #22c55e;
            color: white;
            background: rgba(34, 197, 94, 0.15);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .level-select-btn:hover:not(.active) {
            border-color: #64748b;
            color: #cbd5e1;
        }

        /* 声音控制 */
        .audio-ctrl {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid #475569;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .audio-ctrl:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: #94a3b8;
        }

        .audio-ctrl svg {
            fill: #94a3b8;
            width: 20px;
            height: 20px;
        }

        /* 游戏界面 */
        #game-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 顶部 HUD */
        #hud {
            height: 110px;
            width: 100%;
            background: var(--panel-bg);
            border-bottom: 2px solid #334155;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 5;
        }

        /* 阳光计数器 */
        #sun-counter {
            display: flex;
            align-items: center;
            background: rgba(2, 6, 17, 0.6);
            border: 2px solid #eab308;
            border-radius: 16px;
            padding: 6px 16px 6px 8px;
            min-width: 110px;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }

        #sun-icon {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, #fef08a 20%, #facc15 60%, #eab308 100%);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 12px #facc15;
            animation: sunSpin 10s infinite linear;
        }

        @keyframes sunSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #sun-amount {
            font-size: 24px;
            font-weight: 800;
            color: #fef08a;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 植物卡片区域 */
        #cards-container {
            display: flex;
            gap: 10px;
            margin-left: 15px;
            flex-grow: 1;
        }

        .card {
            width: 78px;
            height: 94px;
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #475569;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6px 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-user-drag: none;
        }

        .card:hover:not(.disabled) {
            transform: translateY(-4px);
            border-color: #22c55e;
            box-shadow: 0 8px 16px -4px rgba(34, 197, 94, 0.3), 0 0 8px rgba(34, 197, 94, 0.2);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(80%);
        }

        .card.selected {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            background: rgba(22, 163, 74, 0.2);
            transform: translateY(-2px);
        }

        /* 卡片内的小图标预览用 Canvas 代替以保持矢量图一致性 */
        .card-preview {
            width: 48px;
            height: 48px;
            pointer-events: none;
        }

        .card-price {
            font-size: 14px;
            font-weight: 800;
            color: #facc15;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 1px 6px;
            border-radius: 10px;
        }

        .card-cooldown-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            top: 0;
            background: var(--card-cooldown);
            height: 0%; /* 从 100% 降到 0% 表示冷却中 */
            transition: height 0.1s linear;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: rgba(255,255,255,0.8);
            font-size: 18px;
        }

        /* 铲子工具 */
        #shovel-btn {
            width: 60px;
            height: 60px;
            background: rgba(51, 65, 85, 0.8);
            border: 2px solid #64748b;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
            -webkit-user-drag: none;
        }

        #shovel-btn:hover {
            border-color: #94a3b8;
            background: rgba(71, 85, 105, 0.8);
            transform: scale(1.05);
        }

        #shovel-btn.selected {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.4);
            background: rgba(234, 179, 8, 0.2);
        }

        #shovel-btn svg {
            width: 32px;
            height: 32px;
            fill: #cbd5e1;
        }

        /* 进度条与控制区 */
        #level-progress-container {
            width: 180px;
            height: 20px;
            background: #1e293b;
            border-radius: 10px;
            border: 2px solid #475569;
            overflow: hidden;
            position: relative;
            margin-left: 15px;
        }

        #level-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ef4444 0%, #f97316 50%, #22c55e 100%);
            transition: width 0.3s ease;
        }

        #level-progress-txt {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #game-controls {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }

        .hud-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hud-btn:hover {
            background: #475569;
            color: white;
        }

        /* 主画布区 */
        #canvas-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
        }

        canvas {
            display: block;
            background: #1e3a1e;
            cursor: default;
        }

        /* 暂停/游戏结束/胜利弹窗 */
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 56px;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .overlay-title.lose {
            color: var(--neon-red);
            text-shadow: 0 0 20px rgba(255, 49, 49, 0.6);
            animation: textShake 0.4s infinite;
        }

        .overlay-title.win {
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
        }

        @keyframes textShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-2px, -2px) rotate(-1deg); }
            80% { transform: translate(2px, 2px) rotate(1deg); }
        }

        .overlay-msg {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .overlay-btn-group {
            display: flex;
            gap: 15px;
        }

        /* 屏幕抖动效果类 */
        .screen-shake {
            animation: screenShake 0.3s ease-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10%, 90% { transform: translate(-4px, 4px); }
            30%, 70% { transform: translate(4px, -4px); }
            50% { transform: translate(-4px, -4px); }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- 声音提示 & 控制器 -->
        <div class="audio-ctrl" id="mute-btn" title="静音/开启声音">
            <svg viewBox="0 0 24 24" id="audio-icon-unmuted">
                <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.07,19.86 21,16.28 21,12C21,7.72 18.07,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
            </svg>
            <svg viewBox="0 0 24 24" id="audio-icon-muted" style="display:none;">
                <path d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.44 16.63,19.78 17.7,18.9L20.73,21.93L22,20.66L4.27,3M19,12C19,12.9 18.84,13.77 18.55,14.58L20.07,16.1C20.67,14.87 21,13.5 21,12C21,7.72 18.07,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,11.23 16.19,10.53 15.71,10L14,8.29V11.27L16.23,13.5C16.4,13 16.5,12.5 16.5,12Z" />
            </svg>
        </div>

        <!-- 临时通知遮罩 -->
        <div id="message-overlay">僵尸来了！</div>

        <!-- 开始屏幕 -->
        <div id="start-screen">
            <h1 class="game-title">植物大战僵尸</h1>
            <p class="game-subtitle">网页版单 HTML 终极复刻</p>
            <button class="menu-btn" id="start-btn">开始游戏</button>
            
            <div class="level-panel">
                <button class="level-select-btn active" data-level="1">关卡 1: 初来乍到</button>
                <button class="level-select-btn" data-level="2">关卡 2: 寒冰射手</button>
                <button class="level-select-btn" data-level="3">关卡 3: 樱桃炸弹</button>
            </div>
        </div>

        <!-- 游戏运行屏幕 -->
        <div id="game-container">
            <!-- 顶栏 HUD -->
            <div id="hud">
                <div id="sun-counter">
                    <div id="sun-icon"></div>
                    <span id="sun-amount">150</span>
                </div>

                <div id="cards-container">
                    <!-- 卡片由 JS 动态生成，维护图标的统一性 -->
                </div>

                <div id="shovel-btn" title="铲除植物" draggable="false">
                    <svg viewBox="0 0 24 24">
                        <path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z" />
                    </svg>
                </div>

                <div id="level-progress-container">
                    <div id="level-progress-bar"></div>
                    <div id="level-progress-txt">关卡进度: 0%</div>
                </div>

                <div id="game-controls">
                    <button class="hud-btn" id="pause-btn">暂停</button>
                    <button class="hud-btn" id="restart-btn">重新开始</button>
                    <button class="hud-btn" id="exit-btn">返回菜单</button>
                </div>
            </div>

            <!-- 画布区域 -->
            <div id="canvas-container">
                <canvas id="game-canvas" width="1000" height="600"></canvas>
            </div>
        </div>

        <!-- 暂停遮罩 -->
        <div class="overlay-screen" id="pause-screen">
            <h2 class="overlay-title" style="color:var(--neon-yellow);">游戏暂停</h2>
            <p class="overlay-msg">歇息一下，植物们正在为你坚守阵地。</p>
            <div class="overlay-btn-group">
                <button class="menu-btn" id="resume-btn" style="font-size: 20px; padding: 10px 30px;">继续游戏</button>
                <button class="menu-btn" id="pause-exit-btn" style="font-size: 20px; padding: 10px 30px; background: linear-gradient(185deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);">返回主菜单</button>
            </div>
        </div>

        <!-- 失败遮罩 -->
        <div class="overlay-screen" id="lose-screen">
            <h2 class="overlay-title lose">僵尸吃掉了你的脑子！</h2>
            <p class="overlay-msg">防线失守，僵尸突破了草坪的最后一层防线。</p>
            <div class="overlay-btn-group">
                <button class="menu-btn" id="retry-btn" style="font-size: 20px; padding: 10px 30px;">再次尝试</button>
                <button class="menu-btn" id="lose-exit-btn" style="font-size: 20px; padding: 10px 30px; background: #475569; box-shadow: 0 10px 25px -5px rgba(71, 85, 105, 0.4);">返回主菜单</button>
            </div>
        </div>

        <!-- 胜利遮罩 -->
        <div class="overlay-screen" id="win-screen">
            <h2 class="overlay-title win">你通关了！</h2>
            <p class="overlay-msg" id="victory-text">恭喜你！成功抵御了所有入侵的僵尸波次。</p>
            <div class="overlay-btn-group">
                <button class="menu-btn" id="next-level-btn" style="font-size: 20px; padding: 10px 30px;">下一关</button>
                <button class="menu-btn" id="win-exit-btn" style="font-size: 20px; padding: 10px 30px; background: #475569; box-shadow: 0 10px 25px -5px rgba(71, 85, 105, 0.4);">返回主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 声音合成引擎 (Web Audio API)
        // ==========================================
        class SoundSynth {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            toggleMute() {
                this.muted = !this.muted;
                const unmutedIcon = document.getElementById('audio-icon-unmuted');
                const mutedIcon = document.getElementById('audio-icon-muted');
                if (this.muted) {
                    unmutedIcon.style.display = 'none';
                    mutedIcon.style.display = 'block';
                } else {
                    unmutedIcon.style.display = 'block';
                    mutedIcon.style.display = 'none';
                    this.init();
                }
            }

            playTone(freq, type, duration, slideToFreq = 0, volume = 0.1) {
                if (this.muted) return;
                this.init();
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    if (slideToFreq > 0) {
                        osc.frequency.exponentialRampToValueAtTime(slideToFreq, this.ctx.currentTime + duration);
                    }
                    
                    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.warn("音频播放失败 (用户未交互):", e);
                }
            }

            playNoise(duration, filterFreq, volume = 0.1, isLowPass = true) {
                if (this.muted) return;
                this.init();
                try {
                    const bufferSize = this.ctx.sampleRate * duration;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }

                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = isLowPass ? 'lowpass' : 'bandpass';
                    filter.frequency.setValueAtTime(filterFreq, this.ctx.currentTime);
                    
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);

                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);

                    noise.start();
                    noise.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.warn(e);
                }
            }

                ctx.ellipse(size*0.12, size*0.42, size*0.16, size*0.07, 0.2, 0, Math.PI*2);

                // 寒冰刺

                    spikes.forEach(p => {

                if (healthRatio > 0.67) {

            drawCherryBombCard(ctx, x, y, size, ageRatio = 0, frame = 0) {
                ctx.save();
                ctx.translate(x, y);

                // 根据即将爆炸的倒计时决定形变大小和抖动
                let scale = 1;
                let shakeX = 0;
                let shakeY = 0;
                if (ageRatio > 0) {
                    scale = 1 + ageRatio * 0.35; // 膨胀
                    shakeX = (Math.random() - 0.5) * ageRatio * 6;
                    shakeY = (Math.random() - 0.5) * ageRatio * 6;
                }
                ctx.translate(shakeX, shakeY);
                ctx.scale(scale, scale);

                // 绿色的Y型连接茎
                ctx.strokeStyle = '#388e3c';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.3); // 汇合点
                ctx.lineTo(-size * 0.18, -size * 0.05); // 左樱桃连接
                ctx.moveTo(0, -size * 0.3);
                ctx.lineTo(size * 0.18, -size * 0.05); // 右樱桃连接
                // 主引信
                ctx.moveTo(0, -size * 0.3);
                ctx.quadraticCurveTo(size * 0.12, -size * 0.4, size * 0.05, -size * 0.48);
                ctx.stroke();

                // 引信火花
                if (ageRatio > 0 || frame > 0) {
                    const sparkX = size * 0.05;
                    const sparkY = -size * 0.48;
                    const sparkR = size * 0.08 + Math.sin(frame * 0.5) * size * 0.03;
                    const grad = ctx.createRadialGradient(sparkX, sparkY, 0, sparkX, sparkY, sparkR);
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.3, '#ffeb3b');
                    grad.addColorStop(0.7, '#f44336');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(sparkX, sparkY, sparkR, 0, Math.PI*2);
                    ctx.fill();
                }

                // 两颗红樱桃
                const cherries = [
                    { ox: -size * 0.18, oy: size * 0.08, color: ageRatio > 0.8 && frame % 4 < 2 ? '#ffeb3b' : '#d32f2f', eyeOffset: -1 },
                    { ox: size * 0.18, oy: size * 0.12, color: ageRatio > 0.8 && frame % 4 < 2 ? '#ffeb3b' : '#b71c1c', eyeOffset: 1 }
                ];

                cherries.forEach((c) => {
                    ctx.save();
                    ctx.translate(c.ox, c.oy);
                    
                    // 身体
                    ctx.fillStyle = c.color;
                    ctx.strokeStyle = '#5d0000';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 0.22, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.ellipse(-size*0.06, -size*0.08, size*0.06, size*0.03, -0.4, 0, Math.PI*2);
                    ctx.fill();

                    // 愤怒的眉毛
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    if (c.eyeOffset < 0) {
                        ctx.beginPath();
                        ctx.moveTo(-size*0.14, -size*0.08);
                        ctx.lineTo(size*0.04, -size*0.02);
                        ctx.moveTo(size*0.1, -size*0.08);
                        ctx.lineTo(-size*0.02, -size*0.02);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(-size*0.1, -size*0.02);
                        ctx.lineTo(size*0.08, -size*0.08);
                        ctx.moveTo(size*0.02, -size*0.02);
                        ctx.lineTo(-size*0.1, -size*0.08);
                        ctx.stroke();
                    }

                    // 白眼球
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-size*0.06, size*0.01, size*0.04, 0, Math.PI*2);
                    ctx.arc(size*0.06, size*0.01, size*0.04, 0, Math.PI*2);
                    ctx.fill();

                    // 黑色瞳孔向内看对方
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(-size*0.06 + c.eyeOffset * size*0.01, size*0.01, size*0.02, 0, Math.PI*2);
                    ctx.arc(size*0.06 + c.eyeOffset * size*0.01, size*0.01, size*0.02, 0, Math.PI*2);
                    ctx.fill();

                    // 咆哮的嘴巴
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(0, size*0.09, size*0.05, 0, Math.PI, true);
                    ctx.fill();

                    ctx.restore();
                });

                ctx.restore();
            }
        };
